<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KPI Chart Builder — Biogaz Plateau Picard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--gd:#1B5E20;--gm:#2E7D32;--gl:#4CAF50;--gp:#E8F5E9;--bg:#F4F9F4;--or:#E65100;--op:#FBE9E7;--grey:#546E7A;}
  html,body{height:100%;font-family:'Google Sans',Arial,sans-serif;background:var(--bg);}
  .header{background:var(--gd);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
  .h-logo{width:38px;height:38px;object-fit:contain;border-radius:5px;background:white;padding:2px;flex-shrink:0;}
  .h-title{font-size:14px;font-weight:700;color:white;}
  .h-sub{font-size:10px;color:#A5D6A7;}
  .h-updated{margin-left:auto;font-size:10px;color:#A5D6A7;text-align:right;line-height:1.4;}
  .loading-screen{position:fixed;inset:0;background:var(--gd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity 0.4s;}
  .loading-screen.hide{opacity:0;pointer-events:none;}
  .loading-logo{width:80px;height:80px;object-fit:contain;background:white;border-radius:12px;padding:4px;}
  .loading-title{color:white;font-size:18px;font-weight:700;}
  .loading-sub{color:#A5D6A7;font-size:13px;}
  .loading-bar{width:200px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
  .loading-progress{height:100%;background:#FDD835;border-radius:2px;animation:prog 1.5s ease-in-out infinite;}
  @keyframes prog{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
  .loading-error{color:#EF9A9A;font-size:12px;text-align:center;max-width:300px;display:none;white-space:pre-line;margin-top:8px;}
  .app{display:flex;height:calc(100vh - 58px);}
  .sidebar{width:240px;min-width:240px;background:white;border-right:1px solid #C8E6C9;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
  .sb-body{padding:10px;flex:1;}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  .chart-header{padding:7px 14px;background:white;border-bottom:1px solid #C8E6C9;flex-shrink:0;}
  .chart-title{font-size:12px;font-weight:700;color:var(--gd);}
  .chart-sub{font-size:10px;color:var(--grey);}
  .chart-wrap{flex:1;position:relative;padding:10px 12px 6px;min-height:0;}
  #myChart{display:block;}
  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--grey);}
  .ph-icon{font-size:36px;opacity:0.2;}.ph-text{font-size:12px;opacity:0.4;text-align:center;padding:0 20px;}
  .chart-footer{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:5px 12px 6px;background:white;border-top:1px solid #C8E6C9;flex-shrink:0;}
  .cf-card{padding:4px 7px;background:var(--bg);border-radius:6px;}
  .cf-lbl{font-size:8px;color:var(--grey);}.cf-val{font-size:11px;font-weight:700;}
  .brand-bar{background:var(--gd);color:white;display:flex;align-items:center;justify-content:center;gap:8px;padding:5px;font-size:10px;flex-shrink:0;}
  .brand-bar b{color:#FDD835;}
  @media(max-width:640px){
    .app{flex-direction:column;height:auto;overflow:visible;}
    .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid #C8E6C9;overflow:visible;}
    .main{height:auto;overflow:visible;}
    .chart-wrap{height:55vw;min-height:240px;max-height:320px;padding:8px;}
    .chart-footer{grid-template-columns:repeat(2,1fr);}
    .cf-lbl{font-size:9px;}.cf-val{font-size:12px;}
  }
  .section{margin-bottom:12px;}
  .stitle{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gm);margin-bottom:7px;display:flex;align-items:center;gap:5px;}
  .stitle::after{content:'';flex:1;height:1px;background:#C8E6C9;}
  .metric-list{display:flex;flex-direction:column;gap:4px;}
  .metric-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid #E8F5E9;background:white;cursor:pointer;transition:all 0.12s;user-select:none;}
  .metric-item:hover:not(.sel-l):not(.sel-r){border-color:#A5D6A7;background:#F9FBE7;}
  .metric-item.sel-l{border-color:var(--gd);background:var(--gp);}
  .metric-item.sel-r{border-color:var(--or);background:var(--op);}
  .m-dot{width:9px;height:9px;border-radius:50%;background:#C8E6C9;flex-shrink:0;}
  .metric-item.sel-l .m-dot{background:var(--gd);}
  .metric-item.sel-r .m-dot{background:var(--or);}
  .m-info{flex:1;min-width:0;}
  .m-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .m-unit{font-size:9px;color:var(--grey);}
  .m-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;flex-shrink:0;}
  .bl{background:#C8E6C9;color:var(--gd);}.br{background:#FFCCBC;color:#BF360C;}
  @media(max-width:640px){
    .metric-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .metric-item{padding:10px 8px;flex-direction:column;align-items:flex-start;gap:4px;border-radius:10px;}
    .m-name{font-size:12px;white-space:normal;line-height:1.2;}
    .m-unit{font-size:10px;}.m-badge{font-size:10px;margin-top:2px;}
    .metric-item.sel-l,.metric-item.sel-r{border-width:2px;}
  }
  .legend{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--grey);}
  @media(max-width:640px){.legend{display:grid;grid-template-columns:1fr 1fr;gap:4px;}.leg{font-size:11px;}}
  .btn-gen{width:100%;padding:13px;background:var(--gm);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s;box-shadow:0 2px 8px rgba(46,125,50,0.25);-webkit-tap-highlight-color:transparent;}
  .btn-gen:hover,.btn-gen:active{background:var(--gd);}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
  .stat-card{background:var(--bg);border-radius:7px;padding:8px 10px;border:1px solid #C8E6C9;}
  .stat-lbl{font-size:9px;color:var(--grey);margin-bottom:2px;}
  .stat-val{font-size:13px;font-weight:700;}
  .stat-bp{font-size:9px;color:var(--gl);margin-top:2px;}
  .col-l{color:var(--gd);}.col-r{color:var(--or);}.col-bp{color:var(--gl);}
  .btn-refresh{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--gm);background:none;border:1px solid #C8E6C9;border-radius:6px;padding:4px 8px;cursor:pointer;margin-top:8px;width:100%;justify-content:center;}
  .btn-refresh:hover{background:var(--gp);}
  .spin{display:inline-block;animation:spin2 1s linear infinite;}
  @keyframes spin2{to{transform:rotate(360deg);}}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── URL de l'API — à remplacer après déploiement Apps Script ──
var API_URL = 'https://script.google.com/macros/s/AKfycbxnGpU3jeLC8h4np7nACa4qmaq3HoKl51BRrBh_SJpcyewVUbKtRjQYpBbxV2V7q1lS/exec';
var API_KEY = 'Biogaz@60!';

var METRICS = [
  {key:'intrants',         label:'Intrants',             unit:'t/j'    },
  {key:'debit',            label:'Débit',                unit:'Nm3/h'  },
  {key:'ca',               label:'CA',                   unit:'€'      },
  {key:'conso_int_eur',    label:'Conso intrants €',     unit:'€'      },
  {key:'conso_int_cnm3',   label:'Conso intrant c€/Nm3', unit:'c€/Nm3' },
  {key:'conso_elec_kwh',   label:'Conso élec kWh',       unit:'kWh'    },
  {key:'conso_elec_eur',   label:'Conso élec €',         unit:'€'      },
  {key:'conso_elec_kwhm3', label:'Conso élec kWh/Nm3',   unit:'kWh/Nm3'},
  {key:'marge_brute',      label:'Marge brute',          unit:'€'      },
  {key:'marge_spec',       label:'Marge brute spéc.',    unit:'€/Nm3'  },
];

var KPI=null, BP=null, selLeft='ca', selRight='marge_brute', chartInst=null;

function loadData() {
  var icon = document.getElementById('refreshIcon');
  icon.className = 'spin';

  var url = API_URL + '?key=' + encodeURIComponent(API_KEY) + '&t=' + Date.now();

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      icon.className = '';
      if (json.error) { showError('Erreur API : ' + json.error); return; }
      KPI = json.data; KPI.labels = json.labels; BP = json.bp;
      document.getElementById('updatedInfo').innerHTML = '🕐 Données du<br>' + json.updated;
      document.getElementById('loadingScreen').classList.add('hide');
      renderMetrics();
      if (chartInst) renderChart();
    })
    .catch(function(err) {
      icon.className = '';
      showError('Erreur réseau.\nVérifiez l\'URL Apps Script dans index.html\n\n' + err.message);
    });
}

function showError(msg) {
  document.getElementById('loadingMsg').textContent = 'Erreur';
  var el = document.getElementById('loadingError');
  el.style.display = 'block'; el.textContent = msg;
}

function renderMetrics() {
  var list=document.getElementById('metricList'); list.innerHTML='';
  METRICS.forEach(function(m){
    var isL=m.key===selLeft,isR=m.key===selRight;
    var item=document.createElement('div');
    item.className='metric-item'+(isL?' sel-l':isR?' sel-r':'');
    var badge=isL?'<span class="m-badge bl">Axe G</span>':isR?'<span class="m-badge br">Axe D</span>':'';
    item.innerHTML='<div class="m-dot"></div><div class="m-info"><div class="m-name">'+m.label+'</div><div class="m-unit">'+m.unit+'</div></div>'+badge;
    item.onclick=function(){
      if(!KPI) return;
      if(m.key===selLeft) return;
      if(m.key===selRight){var t=selLeft;selLeft=selRight;selRight=t;}
      else{selRight=selLeft;selLeft=m.key;}
      renderMetrics();
    };
    list.appendChild(item);
  });
}

function fmtVal(v,unit){
  if(v===null||v===undefined||isNaN(v)) return '—';
  if(unit==='€') return Math.round(v).toLocaleString('fr-FR')+' €';
  if(unit==='kWh') return Math.round(v).toLocaleString('fr-FR')+' kWh';
  if(unit==='Nm3/h') return Math.round(v).toLocaleString('fr-FR')+' Nm3/h';
  if(unit==='t/j') return Number(v).toFixed(1)+' t/j';
  if(unit==='kWh/Nm3') return Number(v).toFixed(2)+' kWh/Nm3';
  if(unit==='€/Nm3') return Number(v).toFixed(2)+' €/Nm3';
  if(unit==='c€/Nm3') return Number(v).toFixed(1)+' c€/Nm3';
  return Number(v).toFixed(2)+' '+unit;
}
function avg(arr){var v=arr.filter(function(x){return x!==null&&!isNaN(x);});return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null;}
function flat(val,n){return(val!==null&&val!==undefined)?new Array(n).fill(val):new Array(n).fill(null);}

function renderChart(){
  if(!KPI) return;
  var mL=METRICS.find(function(m){return m.key===selLeft;});
  var mR=METRICS.find(function(m){return m.key===selRight;});
  if(!mL||!mR) return;
  var isMobile=window.innerWidth<=640;
  var n=KPI.labels.length;
  var dataL=KPI[mL.key],dataR=KPI[mR.key];
  var avgL=avg(dataL),avgR=avg(dataR);
  var bpL=BP&&BP[mL.key]!==null?BP[mL.key]:null;
  var bpR=BP&&BP[mR.key]!==null?BP[mR.key]:null;

  document.getElementById('chartTitle').textContent=mL.label+'  vs  '+mR.label;
  document.getElementById('chartSub').textContent=n+' mois · KPI LIEU';

  document.getElementById('statsArea').innerHTML=
    '<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-lbl">Moy. '+mL.label+'</div><div class="stat-val col-l">'+fmtVal(avgL,mL.unit)+'</div>'+(bpL!==null?'<div class="stat-bp">BP : '+fmtVal(bpL,mL.unit)+'</div>':'')+'</div>'
    +'<div class="stat-card"><div class="stat-lbl">Moy. '+mR.label+'</div><div class="stat-val col-r">'+fmtVal(avgR,mR.unit)+'</div>'+(bpR!==null?'<div class="stat-bp">BP : '+fmtVal(bpR,mR.unit)+'</div>':'')+'</div>'
    +'</div>';

  var footer=document.getElementById('chartFooter'); footer.style.display='grid';
  footer.innerHTML=
    '<div class="cf-card"><div class="cf-lbl">Moy. '+mL.label+'</div><div class="cf-val col-l">'+fmtVal(avgL,mL.unit)+'</div></div>'
   +'<div class="cf-card"><div class="cf-lbl">BP '+mL.label+'</div><div class="cf-val col-bp">'+fmtVal(bpL,mL.unit)+'</div></div>'
   +'<div class="cf-card"><div class="cf-lbl">Moy. '+mR.label+'</div><div class="cf-val col-r">'+fmtVal(avgR,mR.unit)+'</div></div>'
   +'<div class="cf-card"><div class="cf-lbl">BP '+mR.label+'</div><div class="cf-val col-bp">'+fmtVal(bpR,mR.unit)+'</div></div>';

  document.getElementById('placeholder').style.display='none';
  var canvas=document.getElementById('myChart'); canvas.style.display='block';
  var wrap=document.getElementById('chartWrap');
  if(!isMobile){canvas.width=wrap.clientWidth-32;canvas.height=wrap.clientHeight-18;}
  else{canvas.removeAttribute('width');canvas.removeAttribute('height');canvas.style.width='100%';canvas.style.height='100%';}
  if(chartInst){chartInst.destroy();chartInst=null;}

  var mobileLabels=KPI.labels.map(function(l,i){return isMobile&&i%2!==0?'':l;});
  var tooltipPlugin=isMobile?{}:{
    enabled:false,
    external:function(ctx){
      var tm=ctx.tooltip;
      var el=document.getElementById('kpi-tt');
      if(!el){el=document.createElement('div');el.id='kpi-tt';el.style.cssText='position:absolute;pointer-events:none;z-index:200;transition:opacity 0.12s;';wrap.appendChild(el);}
      if(tm.opacity===0){el.style.opacity='0';return;}
      var idx=tm.dataPoints[0].dataIndex;
      var rows='';
      METRICS.forEach(function(m){
        var v=KPI[m.key]?KPI[m.key][idx]:null;
        var isL=m.key===mL.key,isR=m.key===mR.key;
        var dot=isL?'<span style="color:#4CAF50">●</span>':isR?'<span style="color:#FF8A65">●</span>':'<span style="color:#444">·</span>';
        var sty=(isL||isR)?'font-weight:700;color:#F5F5F5;':'color:#BDBDBD;';
        rows+='<div style="display:flex;justify-content:space-between;gap:16px;'+sty+'padding:2px 0">'+dot+' '+m.label+'<span>'+fmtVal(v,m.unit)+'</span></div>';
      });
      el.innerHTML='<div style="background:#1A1A1A;color:#F5F5F5;border-radius:10px;padding:12px 15px;font-size:11px;min-width:220px;box-shadow:0 6px 24px rgba(0,0,0,0.55);border:1px solid #333">'
        +'<div style="font-size:12px;font-weight:700;color:#A5D6A7;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #2E2E2E">'+KPI.labels[idx]+'</div>'+rows+'</div>';
      var left=tm.caretX+14,top=tm.caretY-10;
      if(left+240>wrap.clientWidth)left=tm.caretX-254;
      el.style.opacity='1';el.style.left=left+'px';el.style.top=top+'px';
    }
  };

  chartInst=new Chart(canvas,{
    type:'line',
    data:{
      labels:isMobile?mobileLabels:KPI.labels,
      datasets:[
        {label:mL.label,data:dataL,borderColor:'#1B5E20',backgroundColor:'rgba(27,94,32,0.07)',yAxisID:'yL',tension:0.32,pointRadius:isMobile?3:5,pointHoverRadius:isMobile?5:8,borderWidth:2,pointBackgroundColor:'#1B5E20',fill:false,order:2},
        {label:mR.label,data:dataR,borderColor:'#E65100',backgroundColor:'rgba(230,81,0,0.07)',yAxisID:'yR',tension:0.32,pointRadius:isMobile?3:5,pointHoverRadius:isMobile?5:8,borderWidth:2,pointBackgroundColor:'#E65100',borderDash:[6,3],fill:false,order:2,pointStyle:'rectRot'},
        {label:'Moy. '+mL.label,data:flat(avgL,n),borderColor:'#546E7A',borderDash:[5,4],borderWidth:1.2,pointRadius:0,yAxisID:'yL',fill:false,order:1},
        {label:'Moy. '+mR.label,data:flat(avgR,n),borderColor:'#90A4AE',borderDash:[5,4],borderWidth:1.2,pointRadius:0,yAxisID:'yR',fill:false,order:1},
        {label:'BP '+mL.label,data:flat(bpL,n),borderColor:'#4CAF50',borderDash:[2,4],borderWidth:1.2,pointRadius:0,yAxisID:'yL',fill:false,order:0},
        {label:'BP '+mR.label,data:flat(bpR,n),borderColor:'#81C784',borderDash:[2,4],borderWidth:1.2,pointRadius:0,yAxisID:'yR',fill:false,order:0},
      ]
    },
    options:{
      responsive:isMobile,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:isMobile?{}:tooltipPlugin},
      scales:{
        x:{ticks:{autoSkip:isMobile,maxTicksLimit:isMobile?8:999,maxRotation:isMobile?60:45,font:{size:isMobile?8:10},color:'#546E7A'},grid:{color:'rgba(200,230,201,0.45)'}},
        yL:{type:'linear',position:'left',title:{display:!isMobile,text:mL.label+' ('+mL.unit+')',color:'#1B5E20',font:{size:10,weight:'bold'}},ticks:{color:'#1B5E20',font:{size:isMobile?8:10},maxTicksLimit:isMobile?5:8,callback:function(v){return fmtVal(v,mL.unit);}},grid:{color:'rgba(200,230,201,0.4)'}},
        yR:{type:'linear',position:'right',title:{display:!isMobile,text:mR.label+' ('+mR.unit+')',color:'#E65100',font:{size:10,weight:'bold'}},ticks:{color:'#E65100',font:{size:isMobile?8:10},maxTicksLimit:isMobile?5:8,callback:function(v){return fmtVal(v,mR.unit);}},grid:{drawOnChartArea:false}},
      }
    }
  });
  if(!isMobile){window.onresize=function(){canvas.width=wrap.clientWidth-32;canvas.height=wrap.clientHeight-18;chartInst.resize();};}
  if(isMobile){setTimeout(function(){document.getElementById('chartWrap').scrollIntoView({behavior:'smooth',block:'start'});},100);}
}

renderMetrics();
loadData();
</script>
</body>
</html>
